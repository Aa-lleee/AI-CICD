name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python training/train.py

      - name: Run tests
        run: |
          export PYTHONPATH=.
          pytest

      # 👇 NEW STEP
      - name: Build Docker image
        run: docker build -t ai-cicd-app .