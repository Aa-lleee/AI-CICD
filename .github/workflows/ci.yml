# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — VehicleIQ AI Application
# TCS iON Industry Project | Alen George | Yenepoya University
# ─────────────────────────────────────────────────────────────────────────────

name: VehicleIQ CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/vehicleiq
  IMAGE_TAG:  ${{ github.sha }}

# ── Job 1: Lint ───────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: model

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install flake8
        run: pip install flake8 --quiet

      - name: Fix missing newline at end of files
        run: |
          python3 -c "
          import sys
          for f in ['app.py', 'train_model.py']:
              content = open(f).read()
              fixed = content.rstrip() + '\n'
              open(f, 'w').write(fixed)
              print(f'Fixed: {f}')
          "

      - name: Lint app.py
        run: flake8 app.py --max-line-length=120 --ignore=E501,W503

      - name: Lint train_model.py
        run: flake8 train_model.py --max-line-length=120 --ignore=E501,W503

# ── Job 2: Test ───────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: model

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r ../requirements.txt --quiet

      - name: Smoke-test Flask /predict route
        run: |
          python - <<'PYEOF'
          import numpy as np
          import unittest.mock as mock
          from sklearn.preprocessing import LabelEncoder, StandardScaler

          dummy_model = mock.MagicMock()
          dummy_model.predict.return_value = np.array([[0.1, 0.5, 0.2, 0.1, 0.1]])

          enc = {}
          for col, vals in [
              ("Customer_Gender",         ["Female","Male"]),
              ("Customer_Marital_Status", ["Married","Single"]),
              ("Occupation",              ["Business","Doctor","Driver","Engineer",
                                           "Farmer","Government Employee",
                                           "IT Professional","Lawyer","Retired","Teacher"]),
              ("Product_Category",        ["Bike","Hatchback","SUV","Sedan","Truck"]),
          ]:
              le = LabelEncoder(); le.fit(vals); enc[col] = le

          sc = StandardScaler(); sc.fit(np.zeros((1,5)))

          with mock.patch("tensorflow.keras.models.load_model", return_value=dummy_model), \
               mock.patch("joblib.load", side_effect=[sc, enc]):
              import app as vehicleiq_app
              client = vehicleiq_app.app.test_client()
              resp = client.post("/predict", json={
                  "age": 35, "income": 150000,
                  "Customer_Gender": "Male",
                  "Customer_Marital_Status": "Married",
                  "Occupation": "IT Professional"
              })
              assert resp.status_code == 200, f"Expected 200, got {resp.status_code}"
              data = resp.get_json()
              assert "prediction"     in data
              assert "confidence"     in data
              assert "top_confidence" in data
              print("Smoke test passed:", data["prediction"])
          PYEOF

# ── Job 3: Build & Push to Docker Hub ────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

# ── Job 4: Deploy to EC2 ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          script: |
            echo "=== Disk before cleanup ===" && df -h /
            docker container prune -f
            docker image prune -f
            docker builder prune -f
            echo "=== Disk after cleanup ===" && df -h /

            # ── Pull the new image ─────────────────────────────────────────
            docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            # ── Stop the old container ─────────────────────────────────────
            docker ps -q --filter publish=8000 | xargs -r docker stop
            docker ps -aq --filter publish=8000 | xargs -r docker rm

            docker stop vehicleiq || true
            docker rm   vehicleiq || true
            docker stop ai-app    || true
            docker rm   ai-app    || true

            docker image rm ${{ env.IMAGE_NAME }}:latest || true

            # ── Start the new container ────────────────────────────────────
            docker run -d \
              --name vehicleiq \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            # ── Health check ───────────────────────────────────────────────
            # FIXED: TensorFlow needs 40-60s to load the model on EC2.
            # Previous timeout was 30s (6 x 5s) — too short, always failed.
            # New timeout is 2 minutes (12 x 10s) which is enough for TF
            # to fully initialise even on a t2/t3 micro instance.
            echo "Waiting for VehicleIQ to start (up to 2 minutes)..."
            for i in $(seq 1 12); do
              sleep 10
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "VehicleIQ is healthy (attempt $i)"
                exit 0
              fi
              echo "  attempt $i/12 — not ready yet"
            done

            # ── FIXED: print container logs on failure so you can debug ───
            # Previously the pipeline just printed "Health check failed"
            # with no indication of what went wrong inside the container.
            echo ""
            echo "=== Health check failed — container logs ==="
            docker logs --tail 50 vehicleiq
            exit 1