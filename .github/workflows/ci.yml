name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Train model (IMPORTANT)
      - name: Train model
        run: |
          python training/train.py

      # 5. Verify model artifacts
      - name: Verify model files
        run: |
          ls -la model_artifacts

      # 6. Run tests
      - name: Run tests
        run: |
          export PYTHONPATH=.
          pytest

      # 7. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ai-cicd-app .

      # 8. Login to Docker Hub
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 9. Tag image
      - name: Tag Docker image
        run: |
          docker tag ai-cicd-app ${{ secrets.DOCKER_USERNAME }}/ai-cicd-app:latest

      # 10. Push image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-cicd-app:latest

      # 11. Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/ai-cicd-app:latest
            sudo docker stop ai-app || true
            sudo docker rm ai-app || true
            sudo docker run -d -p 8000:8000 --name ai-app ${{ secrets.DOCKER_USERNAME }}/ai-cicd-app:latest