name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v3

      # 2. Python setup
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - run: pip install -r requirements.txt

      # 4. Train model
      - run: python training/train.py

      # 5. Run tests
      - name: Run tests
        run: |
          export PYTHONPATH=.
          pytest

      # 6. Build Docker image
      - name: Build Docker image
        run: docker build -t ai-cicd-app .

      # 7. Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 8. Tag image
      - run: docker tag ai-cicd-app ${{ secrets.DOCKER_USERNAME }}/ai-cicd-app:latest

      # 9. Push image
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-cicd-app:latest

      # 🔥 10. Deploy to EC2 automatically
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/ai-cicd-app:latest

            # Stop ALL containers using port 8000
            sudo docker ps -q --filter "publish=8000" | xargs -r sudo docker stop
            sudo docker ps -aq --filter "publish=8000" | xargs -r sudo docker rm

            # Remove old container (just in case)
            sudo docker rm ai-app || true

            # Run new container
            sudo docker run -d -p 8000:8000 --name ai-app ${{ secrets.DOCKER_USERNAME }}/ai-cicd-app:latest